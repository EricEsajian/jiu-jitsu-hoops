<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sunday Hoops Team Maker</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f4f4f9;
            color: #333;
            max-width: 400px;
            margin: 0 auto;
            padding: 20px;
            text-align: center;
        }
        h1 { color: #d9534f; }
        input {
            padding: 10px;
            width: 70%;
            margin-bottom: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
        button {
            padding: 10px 15px;
            background-color: #d9534f;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover { background-color: #c9302c; }
        .generate-btn {
            background-color: #333;
            width: 100%;
            margin-top: 20px;
            font-size: 18px;
        }
        .generate-btn:hover { background-color: #000; }
        ul {
            list-style-type: none;
            padding: 0;
            text-align: left;
        }
        li {
            background: #fff;
            margin: 5px 0;
            padding: 10px;
            border-radius: 5px;
            border-left: 5px solid #d9534f;
            display: flex;
            justify-content: space-between;
        }
        .delete-btn {
            background: none;
            color: #999;
            padding: 0;
            font-size: 14px;
        }
        .teams-container {
            display: flex;
            justify-content: space-between;
            margin-top: 20px;
        }
        .team {
            width: 48%;
            background: white;
            padding: 10px;
            border-radius: 5px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .team h3 { margin-top: 0; color: #333; border-bottom: 2px solid #d9534f; padding-bottom: 5px;}
        
        /* New Bench Styling */
        .bench-container {
            margin-top: 20px;
            background: white;
            padding: 15px;
            border-radius: 5px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            display: none; /* Hidden until needed */
        }
        .bench-container h3 { 
            margin-top: 0; 
            color: #333; 
            border-bottom: 2px solid #f0ad4e; /* Yellow line for bench */
            padding-bottom: 5px;
        }
        .bench-container li {
            border-left: 5px solid #f0ad4e; 
        }
    </style>
</head>
<body>

    <h1>🥋 Jiu Jitsu Hoops 🏀</h1>
    
    <input type="text" id="playerName" placeholder="Enter player name" onkeypress="handleKeyPress(event)">
    <button onclick="addPlayer()">Add</button>

    <ul id="playerList"></ul>

    <button class="generate-btn" onclick="generateTeams()">Generate Teams</button>

    <div class="teams-container" id="teamsResult" style="display: none;">
        <div class="team" id="team1">
            <h3>Team 1</h3>
            <ul id="team1List"></ul>
        </div>
        <div class="team" id="team2">
            <h3>Team 2</h3>
            <ul id="team2List"></ul>
        </div>
    </div>

    <div class="bench-container" id="benchDiv">
        <h3>🪑 Bench / Next Up</h3>
        <ul id="benchList"></ul>
    </div>

    <script>
        let players = [];

        function addPlayer() {
            const input = document.getElementById('playerName');
            const name = input.value.trim();
            if (name) {
                players.push(name);
                input.value = '';
                updatePlayerList();
            }
        }

        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                addPlayer();
            }
        }

        function removePlayer(index) {
            players.splice(index, 1);
            updatePlayerList();
        }

        function updatePlayerList() {
            const list = document.getElementById('playerList');
            list.innerHTML = '';
            players.forEach((player, index) => {
                list.innerHTML += `<li>${player} <button class="delete-btn" onclick="removePlayer(${index})">X</button></li>`;
            });
        }

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }

        function generateTeams() {
            if (players.length < 2) {
                alert("Add at least 2 players!");
                return;
            }

            // Copy and shuffle the array
            let shuffledPlayers = [...players];
            shuffleArray(shuffledPlayers);

            let team1 = [];
            let team2 = [];
            let bench = [];

            // NEW LOGIC: Max 5 players per team. The rest go to the bench.
            if (shuffledPlayers.length <= 10) {
                // If 10 or fewer, split evenly
                const half = Math.ceil(shuffledPlayers.length / 2);
                team1 = shuffledPlayers.slice(0, half);
                team2 = shuffledPlayers.slice(half);
            } else {
                // If more than 10, grab 5 for each team, rest to bench
                team1 = shuffledPlayers.slice(0, 5);
                team2 = shuffledPlayers.slice(5, 10);
                bench = shuffledPlayers.slice(10);
            }

            // Display results
            document.getElementById('teamsResult').style.display = 'flex';
            const benchDiv = document.getElementById('benchDiv');
            
            const t1List = document.getElementById('team1List');
            const t2List = document.getElementById('team2List');
            const bList = document.getElementById('benchList');
            
            t1List.innerHTML = '';
            t2List.innerHTML = '';
            bList.innerHTML = '';

            team1.forEach(p => t1List.innerHTML += `<li>${p}</li>`);
            team2.forEach(p => t2List.innerHTML += `<li>${p}</li>`);

            // Show or hide the bench depending on if there are extra players
            if (bench.length > 0) {
                benchDiv.style.display = 'block';
                bench.forEach(p => bList.innerHTML += `<li>${p}</li>`);
            } else {
                benchDiv.style.display = 'none';
            }
        }
    </script>
</body>
</html>
