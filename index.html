<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jiu Jitsu Hoops</title>
    
    <link rel="icon" type="image/png" href="logo.png">
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Montserrat', sans-serif;
            background-color: #121212; /* Sleek Dark Background */
            color: #ffffff; /* White Text */
            max-width: 400px;
            margin: 0 auto;
            padding: 20px;
            text-align: center;
        }
        h1 { color: #d9534f; text-transform: uppercase; letter-spacing: 1px;}
        
        input {
            padding: 12px;
            width: 70%;
            margin-bottom: 10px;
            background-color: #2a2a2a; /* Dark gray input */
            color: white;
            border: 1px solid #444;
            border-radius: 8px;
            font-family: 'Montserrat', sans-serif;
        }
        input:focus { outline: none; border-color: #d9534f; } /* Red border when typing */
        
        button {
            padding: 12px 18px;
            background-color: #d9534f;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-family: 'Montserrat', sans-serif;
            transition: background-color 0.2s; /* Smooth color change on hover */
        }
        button:hover { background-color: #c9302c; }
        
        .generate-btn {
            background-color: #ffffff;
            color: #121212;
            width: 100%;
            margin-top: 20px;
            font-size: 18px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .generate-btn:hover { background-color: #e0e0e0; }
        
        ul {
            list-style-type: none;
            padding: 0;
            text-align: left;
        }
        li {
            background: #1e1e1e; /* Slightly lighter dark gray for list items */
            margin: 8px 0;
            padding: 12px;
            border-radius: 8px;
            border-left: 5px solid #d9534f;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3); /* Subtle drop shadow */
        }
        
        .delete-btn {
            background: none;
            color: #777;
            padding: 5px;
            font-size: 16px;
        }
        .delete-btn:hover { color: #d9534f; background: none; }
        
        .teams-container {
            display: flex;
            justify-content: space-between;
            margin-top: 25px;
        }
        .team {
            width: 48%;
            background: #1e1e1e;
            padding: 10px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
        .team h3 { 
            margin-top: 0; 
            color: #ffffff; 
            border-bottom: 2px solid #d9534f; 
            padding-bottom: 8px;
            font-size: 16px;
        }

        /* In-Team Bench Styling */
        .team-bench-title {
            margin-top: 15px;
            margin-bottom: 5px;
            color: #ffffff;
            border-bottom: 2px solid #f0ad4e;
            padding-bottom: 5px;
            font-size: 14px;
            text-align: left;
        }
        .bench-list li {
            border-left: 5px solid #f0ad4e;
            padding: 10px;
            font-size: 14px;
        }

        /* The Animation Code */
        @keyframes slideUpFade {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-in {
            animation: slideUpFade 0.5s ease-out forwards;
        }

        /* Footer Styling */
        .footer {
            margin-top: 40px;
            font-size: 12px;
            color: #888;
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>

    <h1>🥋 Jiu Jitsu Hoops 🏀</h1>
    
    <input type="text" id="playerName" placeholder="Enter player name" onkeypress="handleKeyPress(event)">
    <button onclick="addPlayer()">Add</button>

    <ul id="playerList"></ul>

    <button class="generate-btn" onclick="generateTeams()">Generate Teams</button>

    <div class="teams-container" id="teamsResult" style="display: none;">
        <div class="team" id="team1">
            <h3>⭐ Team 1</h3>
            <ul id="team1List"></ul>
            <div id="team1BenchDiv" style="display: none;">
                <h4 class="team-bench-title">🪑 Bench / Next Up</h4>
                <ul id="team1BenchList" class="bench-list"></ul>
            </div>
        </div>
        <div class="team" id="team2">
            <h3>⭐ Team 2</h3>
            <ul id="team2List"></ul>
            <div id="team2BenchDiv" style="display: none;">
                <h4 class="team-bench-title">🪑 Bench / Next Up</h4>
                <ul id="team2BenchList" class="bench-list"></ul>
            </div>
        </div>
    </div>

    <div class="footer">
        Website Made With ♥️ by Quantum Prophet AI
    </div>

    <script>
        let players = [];

        function addPlayer() {
            const input = document.getElementById('playerName');
            const name = input.value.trim();
            if (name) {
                players.push(name);
                input.value = '';
                updatePlayerList();
            }
        }

        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                addPlayer();
            }
        }

        function removePlayer(index) {
            players.splice(index, 1);
            updatePlayerList();
        }

        function updatePlayerList() {
            const list = document.getElementById('playerList');
            list.innerHTML = '';
            players.forEach((player, index) => {
                list.innerHTML += `<li>${player} <button class="delete-btn" onclick="removePlayer(${index})">✕</button></li>`;
            });
        }

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }

        function generateTeams() {
            if (players.length < 2) {
                alert("Add at least 2 players!");
                return;
            }

            let shuffledPlayers = [...players];
            shuffleArray(shuffledPlayers);

            let team1All = [];
            let team2All = [];

            // Distribute players evenly to both teams like dealing cards
            shuffledPlayers.forEach((player, index) => {
                if (index % 2 === 0) {
                    team1All.push(player);
                } else {
                    team2All.push(player);
                }
            });

            // The first 5 go to the main roster, the rest go to the team's bench
            let team1Starters = team1All.slice(0, 5);
            let team1Bench = team1All.slice(5);

            let team2Starters = team2All.slice(0, 5);
            let team2Bench = team2All.slice(5);

            const teamsResult = document.getElementById('teamsResult');
            
            // Re-trigger animation
            teamsResult.classList.remove('animate-in');
            teamsResult.style.display = 'flex';
            void teamsResult.offsetWidth; 
            teamsResult.classList.add('animate-in');
            
            // Get DOM elements for lists and bench divs
            const t1List = document.getElementById('team1List');
            const t2List = document.getElementById('team2List');
            const t1BenchList = document.getElementById('team1BenchList');
            const t2BenchList = document.getElementById('team2BenchList');
            const t1BenchDiv = document.getElementById('team1BenchDiv');
            const t2BenchDiv = document.getElementById('team2BenchDiv');
            
            // Clear previous results
            t1List.innerHTML = '';
            t2List.innerHTML = '';
            t1BenchList.innerHTML = '';
            t2BenchList.innerHTML = '';

            // Render Starters
            team1Starters.forEach(p => t1List.innerHTML += `<li>${p}</li>`);
            team2Starters.forEach(p => t2List.innerHTML += `<li>${p}</li>`);

            // Render Team 1 Bench if they have extra players
            if (team1Bench.length > 0) {
                t1BenchDiv.style.display = 'block';
                team1Bench.forEach(p => t1BenchList.innerHTML += `<li>${p}</li>`);
            } else {
                t1BenchDiv.style.display = 'none';
            }

            // Render Team 2 Bench if they have extra players
            if (team2Bench.length > 0) {
                t2BenchDiv.style.display = 'block';
                team2Bench.forEach(p => t2BenchList.innerHTML += `<li>${p}</li>`);
            } else {
                t2BenchDiv.style.display = 'none';
            }
        }
    </script>
</body>
</html>
