<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jiu Jitsu Hoops</title>
    
    <link rel="icon" type="image/png" href="logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/nosleep/0.12.0/NoSleep.min.js"></script>

    <style>
        body {
            font-family: 'Montserrat', sans-serif;
            background-color: #121212; 
            color: #ffffff; 
            max-width: 400px;
            margin: 0 auto;
            padding: 20px;
            text-align: center;
            transition: background-color 0.3s ease;
        }
        h1 { color: #d9534f; text-transform: uppercase; letter-spacing: 1px;}
        
        input {
            padding: 12px;
            width: 70%;
            margin-bottom: 10px;
            background-color: #2a2a2a; 
            color: white;
            border: 1px solid #444;
            border-radius: 8px;
            font-family: 'Montserrat', sans-serif;
        }
        input:focus { outline: none; border-color: #d9534f; } 
        
        button {
            padding: 12px 18px;
            background-color: #d9534f;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-family: 'Montserrat', sans-serif;
            transition: background-color 0.2s; 
        }
        button:hover { background-color: #c9302c; }
        
        .generate-btn {
            background-color: #ffffff;
            color: #121212;
            width: 100%;
            margin-top: 20px;
            font-size: 18px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .generate-btn:hover { background-color: #e0e0e0; }

        .share-btn {
            background-color: #007bff; 
            width: 100%;
            margin-top: 15px;
            font-size: 16px;
            display: none; 
        }
        .share-btn:hover { background-color: #0056b3; }
        
        ul {
            list-style-type: none;
            padding: 0;
            text-align: left;
        }
        li {
            background: #1e1e1e; 
            margin: 8px 0;
            padding: 12px;
            border-radius: 8px;
            border-left: 5px solid #d9534f;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3); 
        }
        
        .tier-label {
            font-size: 12px;
            color: #aaa;
            margin-left: 10px;
            font-weight: normal;
        }

        .delete-btn {
            background: none;
            color: #777;
            padding: 5px;
            font-size: 16px;
        }
        .delete-btn:hover { color: #d9534f; background: none; }
        
        .teams-container {
            display: flex;
            justify-content: space-between;
            margin-top: 25px;
        }
        .team {
            width: 48%;
            background: #1e1e1e;
            padding: 10px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
        .team h3 { 
            margin-top: 0; 
            color: #ffffff; 
            border-bottom: 2px solid #d9534f; 
            padding-bottom: 8px;
            font-size: 16px;
        }

        .team-bench-title {
            margin-top: 15px;
            margin-bottom: 5px;
            color: #ffffff;
            border-bottom: 2px solid #f0ad4e;
            padding-bottom: 5px;
            font-size: 14px;
            text-align: left;
        }
        .bench-list li {
            border-left: 5px solid #f0ad4e;
            padding: 10px;
            font-size: 14px;
        }

        /* Portrait Scoreboard & Timer */
        .scoreboard-container {
            display: none; 
            justify-content: space-between;
            align-items: center;
            margin-top: 25px;
            background: #1e1e1e;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
        .score-box, .timer-box { width: 32%; }
        .score-box h3, .timer-box h3 { margin: 0 0 10px 0; font-size: 12px; color: #aaa;}
        .score-number {
            font-size: 36px;
            font-weight: bold;
            margin-bottom: 10px;
            color: #fff;
            user-select: none;
        }
        .timer-display {
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 10px;
            color: #f0ad4e;
            user-select: none;
        }
        .score-controls, .timer-controls {
            display: flex;
            justify-content: center;
            gap: 5px;
        }
        .score-btn {
            padding: 8px 12px;
            font-size: 16px;
            border-radius: 5px;
            background-color: #333;
        }
        .score-btn:hover { background-color: #555; }

        @keyframes slideUpFade {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-in {
            animation: slideUpFade 0.5s ease-out forwards;
        }

        .footer {
            margin-top: 40px;
            font-size: 12px;
            color: #888;
            letter-spacing: 0.5px;
        }

        /* ========================================= */
        /* 📱 LANDSCAPE "PRO SCOREBOARD" MODE 📱 */
        /* ========================================= */
        @media screen and (orientation: landscape) and (max-height: 600px) {
            .hide-in-landscape { display: none !important; }
            
            body {
                padding: 0;
                margin: 0;
                background-color: #000000; 
                overflow: hidden; 
            }

            .scoreboard-container {
                display: flex !important; 
                position: fixed;
                top: 0;
                left: 0;
                width: 100vw;
                height: 100vh;
                margin: 0;
                padding: 20px 40px;
                border-radius: 0;
                background-color: #000000;
                box-sizing: border-box;
                z-index: 9999;
            }

            .score-box, .timer-box { width: 33%; }
            
            .score-number { font-size: 35vh; cursor: pointer; margin: 0; }
            .timer-display { font-size: 25vh; cursor: pointer; margin: 0; }
            .score-box h3, .timer-box h3 { font-size: 6vh; color: #ffffff; letter-spacing: 2px;}

            .score-controls, .timer-controls { display: none !important; }
        }
    </style>
</head>
<body>

    <h1 class="hide-in-landscape">🥋 Jiu Jitsu Hoops 🏀</h1>
    
    <div class="hide-in-landscape">
        <input type="text" id="playerName" placeholder="Enter player name" onkeypress="handleKeyPress(event)">
        <button onclick="addPlayer()">Add</button>
    </div>

    <ul id="playerList" class="hide-in-landscape"></ul>

    <button class="generate-btn hide-in-landscape" onclick="generateTeams()">Generate Teams</button>

    <div class="teams-container hide-in-landscape" id="teamsResult" style="display: none;">
        <div class="team" id="team1">
            <h3>⭐ Team 1</h3>
            <ul id="team1List"></ul>
            <div id="team1BenchDiv" style="display: none;">
                <h4 class="team-bench-title">🪑 Bench</h4>
                <ul id="team1BenchList" class="bench-list"></ul>
            </div>
        </div>
        <div class="team" id="team2">
            <h3>⭐ Team 2</h3>
            <ul id="team2List"></ul>
            <div id="team2BenchDiv" style="display: none;">
                <h4 class="team-bench-title">🪑 Bench</h4>
                <ul id="team2BenchList" class="bench-list"></ul>
            </div>
        </div>
    </div>

    <button id="shareBtn" class="share-btn hide-in-landscape" onclick="shareTeams()">📤 Share Teams to Chat</button>

    <div class="scoreboard-container" id="scoreboardDiv">
        <div class="score-box">
            <h3>TEAM 1</h3>
            <div class="score-number" id="score1Display" onclick="updateScore(1, 1)">0</div>
            <div class="score-controls">
                <button class="score-btn" onclick="updateScore(1, -1)">-</button>
                <button class="score-btn" style="background-color: #5cb85c;" onclick="updateScore(1, 1)">+</button>
            </div>
        </div>

        <div class="timer-box">
            <h3 class="hide-in-landscape">CLOCK</h3>
            <div class="timer-display" id="timerDisplay" onclick="toggleTimer()">00:00</div>
            <div class="timer-controls">
                <button class="score-btn" id="timerBtn" onclick="toggleTimer()">▶️</button>
                <button class="score-btn" onclick="resetTimer()">🔄</button>
            </div>
        </div>

        <div class="score-box">
            <h3>TEAM 2</h3>
            <div class="score-number" id="score2Display" onclick="updateScore(2, 1)">0</div>
            <div class="score-controls">
                <button class="score-btn" onclick="updateScore(2, -1)">-</button>
                <button class="score-btn" style="background-color: #5cb85c;" onclick="updateScore(2, 1)">+</button>
            </div>
        </div>
    </div>

    <div class="footer hide-in-landscape">
        Website Made With ♥️ by Quantum Prophet AI
    </div>

    <script>
        let players = [];
        let t1Starters = [], t2Starters = [], t1Bench = [], t2Bench = [];
        let score1 = 0, score2 = 0;
        
        let timerInterval;
        let seconds = 0;
        let isTimerRunning = false;

        var noSleep = new NoSleep();

        // --- HARDCODED PLAYER TIERS ---
        const playerTiers = {
            "ivan": 2, "eric": 2, "justin": 1, "rudy": 2, "ruben": 1,
            "brandon": 3, "sean": 1, "jeremy lin": 2, "brett": 1, "luther": 3,
            "christian": 3, "jonathan": 1, "michael": 1, "somak": 2, "lance": 3,
            "goodson": 2, "vinnie": 1, "eddie": 3, "paul sr": 3, "tom": 2,
            "luis": 1, "tristan": 2, "zane": 2, "hr rob": 1, "pete q": 2,
            "tyrone": 1, "alex": 3, "dave": 3
        };

        // Function to look up a player's tier
        function getPlayerTier(name) {
            const cleanName = name.trim().toLowerCase();
            return playerTiers[cleanName] || 2; // Default to Tier 2 if not on the list
        }

        window.onload = function() {
            const savedPlayers = localStorage.getItem('jiuJitsuHoopsRegulars');
            if (savedPlayers) {
                players = JSON.parse(savedPlayers);
                updatePlayerList();
            }
        };

        function savePlayers() {
            localStorage.setItem('jiuJitsuHoopsRegulars', JSON.stringify(players));
        }

        function addPlayer() {
            const input = document.getElementById('playerName');
            const name = input.value.trim();
            if (name) {
                // Ensure we don't add duplicates
                if (!players.some(p => p.toLowerCase() === name.toLowerCase())) {
                    players.push(name);
                    updatePlayerList();
                    savePlayers(); 
                }
                input.value = '';
            }
        }

        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                addPlayer();
            }
        }

        function removePlayer(index) {
            players.splice(index, 1);
            updatePlayerList();
            savePlayers(); 
        }

        function updatePlayerList() {
            const list = document.getElementById('playerList');
            list.innerHTML = '';
            players.forEach((player, index) => {
                const tier = getPlayerTier(player);
                // Added a span to display the tier nicely in the UI
                list.innerHTML += `<li>
                    <span>${player} <span class="tier-label">(Tier ${tier})</span></span> 
                    <button class="delete-btn" onclick="removePlayer(${index})">✕</button>
                </li>`;
            });
        }

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }

        function toggleTimer() {
            if (isTimerRunning) {
                clearInterval(timerInterval);
                document.getElementById('timerBtn').innerText = "▶️";
            } else {
                timerInterval = setInterval(() => {
                    seconds++;
                    updateTimerDisplay();
                }, 1000);
                document.getElementById('timerBtn').innerText = "⏸️";
            }
            isTimerRunning = !isTimerRunning;
        }

        function resetTimer() {
            clearInterval(timerInterval);
            seconds = 0;
            isTimerRunning = false;
            document.getElementById('timerBtn').innerText = "▶️";
            updateTimerDisplay();
        }

        function updateTimerDisplay() {
            let m = Math.floor(seconds / 60).toString().padStart(2, '0');
            let s = (seconds % 60).toString().padStart(2, '0');
            document.getElementById('timerDisplay').innerText = `${m}:${s}`;
        }

        function updateScore(team, change) {
            if (team === 1) {
                score1 = Math.max(0, score1 + change); 
                document.getElementById('score1Display').innerText = score1;
            } else {
                score2 = Math.max(0, score2 + change); 
                document.getElementById('score2Display').innerText = score2;
            }
        }

        function shareTeams() {
            let text = "🏀 *Jiu Jitsu Hoops Teams* 🥋\n\n";
            text += "⭐ *Team 1:*\n" + t1Starters.join(', ') + "\n";
            if (t1Bench.length > 0) text += "🪑 Bench: " + t1Bench.join(', ') + "\n";
            
            text += "\n⭐ *Team 2:*\n" + t2Starters.join(', ') + "\n";
            if (t2Bench.length > 0) text += "🪑 Bench: " + t2Bench.join(', ') + "\n";

            if (navigator.share) {
                navigator.share({
                    title: 'Jiu Jitsu Hoops Teams',
                    text: text
                }).catch(err => console.log('Share canceled'));
            } else {
                navigator.clipboard.writeText(text).then(() => {
                    alert("Teams copied to clipboard! Paste it into your group chat.");
                });
            }
        }

        function generateTeams() {
            if (players.length < 2) {
                alert("Add at least 2 players!");
                return;
            }

            noSleep.enable();

            // --- TIER SORTING LOGIC ---
            let tier1 = [];
            let tier2 = [];
            let tier3 = [];

            // Group current players by tier
            players.forEach(p => {
                const t = getPlayerTier(p);
                if (t === 1) tier1.push(p);
                else if (t === 3) tier3.push(p);
                else tier2.push(p);
            });

            // Shuffle each tier independently to keep things random but fair
            shuffleArray(tier1);
            shuffleArray(tier2);
            shuffleArray(tier3);

            let team1All = [];
            let team2All = [];
            
            // This toggle deals players back and forth like a deck of cards
            // so one team doesn't accidentally get an extra player from every single tier.
            let dealToTeam1 = true;

            const distributePlayers = (tierArray) => {
                tierArray.forEach(p => {
                    if (dealToTeam1) {
                        team1All.push(p);
                    } else {
                        team2All.push(p);
                    }
                    dealToTeam1 = !dealToTeam1;
                });
            };

            // Distribute Best to Worst
            distributePlayers(tier1);
            distributePlayers(tier2);
            distributePlayers(tier3);

            // Separate starters and bench
            t1Starters = team1All.slice(0, 5);
            t1Bench = team1All.slice(5);
            t2Starters = team2All.slice(0, 5);
            t2Bench = team2All.slice(5);

            // Reset UI
            score1 = 0;
            score2 = 0;
            document.getElementById('score1Display').innerText = score1;
            document.getElementById('score2Display').innerText = score2;
            resetTimer();

            const teamsResult = document.getElementById('teamsResult');
            const scoreboardDiv = document.getElementById('scoreboardDiv');
            const shareBtn = document.getElementById('shareBtn');
            
            teamsResult.classList.remove('animate-in');
            scoreboardDiv.classList.remove('animate-in');
            
            teamsResult.style.display = 'flex';
            scoreboardDiv.style.display = 'flex';
            shareBtn.style.display = 'block';

            void teamsResult.offsetWidth; 
            teamsResult.classList.add('animate-in');
            scoreboardDiv.classList.add('animate-in');
            
            const t1List = document.getElementById('team1List');
            const t2List = document.getElementById('team2List');
            const t1BenchList = document.getElementById('team1BenchList');
            const t2BenchList = document.getElementById('team2BenchList');
            const t1BenchDiv = document.getElementById('team1BenchDiv');
            const t2BenchDiv = document.getElementById('team2BenchDiv');
            
            t1List.innerHTML = '';
            t2List.innerHTML = '';
            t1BenchList.innerHTML = '';
            t2BenchList.innerHTML = '';

            t1Starters.forEach(p => t1List.innerHTML += `<li>${p}</li>`);
            t2Starters.forEach(p => t2List.innerHTML += `<li>${p}</li>`);

            if (t1Bench.length > 0) {
                t1BenchDiv.style.display = 'block';
                t1Bench.forEach(p => t1BenchList.innerHTML += `<li>${p}</li>`);
            } else {
                t1BenchDiv.style.display = 'none';
            }

            if (t2Bench.length > 0) {
                t2BenchDiv.style.display = 'block';
                t2Bench.forEach(p => t2BenchList.innerHTML += `<li>${p}</li>`);
            } else {
                t2BenchDiv.style.display = 'none';
            }
        }
    </script>
</body>
</html>
